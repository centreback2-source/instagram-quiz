<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>インスタ本気合宿 | 復習クイズ</title>
<style>
/* ===== デザイン・コンセプト: 漆黒と炎の情熱 ===== */
*{
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent; /* iOS Safari タップ時の網掛け防止 */
}
:root{
  --c-fire: linear-gradient(135deg, #FF4D00, #F59E0B); /* 燃えるようなオレンジ */
  --c-gold: #FFD700;
  --c-bg: #000000; /* 漆黒背景 */
  --c-card: #111111;
  --c-border: #333333;
  --c-text: #FFFFFF;
  --c-text-mid: #AAAAAA;
  --c-success: #22C55E;
  --c-error: #EF4444;
}
body{
  font-family:'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  min-height: 100dvh; /* iOS Safari用 動的な高さ対応 */
  line-height: 1.6;
}

#app{max-width:520px;margin:0 auto;padding:2rem 1.25rem}
.screen{display:none}
.screen.active{display:block; animation: fadeIn 0.4s ease;}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ===== START SCREEN ===== */
.hero-badge{
  display: inline-block;
  background: var(--c-fire);
  color: #000;
  font-size: 11px;
  font-weight: 900;
  padding: 4px 10px;
  border-radius: 4px;
  margin-bottom: 0.8rem;
  letter-spacing: 0.1em;
}
.app-title{
  font-size: 32px;
  font-weight: 900;
  line-height: 1.2;
  margin-bottom: 1rem;
  background: var(--c-fire);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 8px rgba(255, 77, 0, 0.3));
}
.app-sub{
  font-size: 14px;
  color: var(--c-text-mid);
  margin-bottom: 2.5rem;
  border-left: 2px solid #FF4D00;
  padding-left: 1rem;
}

.genre-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
.genre-card{
  background: var(--c-card);
  border: 1px solid var(--c-border);
  border-radius: 16px;
  padding: 1.5rem 1rem;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  -webkit-appearance: none;
}
.genre-card:hover{
  border-color: #FF4D00;
  box-shadow: 0 0 20px rgba(255, 77, 0, 0.2);
  transform: translateY(-2px);
}
.g-dot{font-size: 24px; margin-bottom: 12px; display: block;}
.genre-name{font-size:14px;font-weight:700;color:var(--c-text)}
.genre-count{font-size:10px;color:#FF4D00;margin-top:4px;font-weight: 800;}

.all-card{
  grid-column: 1/-1;
  background: linear-gradient(90deg, #111, #222);
  border: 1px solid #FF4D00 !important;
  display: flex;
  align-items: center;
  gap: 15px;
}
.all-card .genre-name { color: var(--c-gold); font-size: 16px; }

/* ===== QUIZ SCREEN HEADER (Home Button Updated) ===== */
.q-header{ margin-bottom: 1.5rem; }
.q-meta{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px}
.q-badge-wrap{ display: flex; align-items: center; gap: 10px; }
.q-badge{font-size:11px; font-weight:800; padding:4px 12px; border-radius:4px; background:#222; color:var(--c-gold); letter-spacing: 0.05em;}

.home-btn{
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid #555;
  color: #CCC;
  font-size: 13px;
  font-weight: 800;
  padding: 6px 16px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-appearance: none;
}
.home-btn:hover{ color: #fff; border-color: #FF4D00; background: rgba(255, 77, 0, 0.15); }

.progress-bar{height:5px;background:#222;border-radius:3px; overflow: hidden;}
.progress-fill{height:100%;background:var(--c-fire);box-shadow: 0 0 10px #FF4D00; transition:width 0.4s ease;}

/* ===== QUIZ CONTENT ===== */
.question-text{font-size:18px;font-weight:700;line-height:1.6;margin-bottom:1.8rem; min-height: 3.2em;}

.choice-btn{
  background: #111;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 1.1rem;
  margin-bottom: 12px;
  cursor: pointer;
  text-align: left;
  font-size: 15px;
  color: var(--c-text);
  width: 100%;
  transition: all 0.2s;
  -webkit-appearance: none;
}
.choice-btn:hover:not(:disabled){ border-color: #FF4D00; background: #1a100a; }
.choice-btn.correct{ border-color: var(--c-success); background: #062010; color: #fff; }
.choice-btn.wrong{ border-color: var(--c-error); background: #200606; color: #fff; }

.feedback{
  margin-top: 1.2rem;
  padding: 1.2rem;
  border-radius: 12px;
  display: none;
  font-size: 14px;
  border: 1px solid;
}
.feedback.show{display:block; animation: fadeIn 0.3s;}
.feedback.correct{background:#062010; border-color:var(--c-success);}
.feedback.wrong{background:#200606; border-color:var(--c-error);}
.fb-head{font-weight:900; font-size: 17px; margin-bottom: 6px;}

.next-btn{
  margin-top: 1.5rem;
  width: 100%;
  padding: 1.2rem;
  background: var(--c-fire);
  border: none;
  border-radius: 12px;
  color: #000;
  font-weight: 900;
  font-size: 16px;
  cursor: pointer;
  display: none;
}

/* ===== RESULT SCREEN ===== */
.result-top{
  background: #111;
  border: 1px solid #FF4D00;
  border-radius: 20px;
  padding: 2.5rem 1.5rem;
  text-align: center;
  margin-bottom: 1.5rem;
}
.score-big{font-size: 64px; font-weight: 900; color: var(--c-gold);}
.score-msg{font-size: 17px; font-weight: 700; margin-top: 1rem; padding: 0 10px;}
.retry-btn{
  width: 100%;
  padding: 1.2rem;
  background: #fff;
  color: #000;
  border: none;
  border-radius: 12px;
  font-weight: 900;
  margin-bottom: 12px;
  cursor: pointer;
}
.back-btn-res{
  width: 100%;
  padding: 1rem;
  background: transparent;
  color: #888;
  border: 1px solid #333;
  border-radius: 12px;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="app">
  <div id="start" class="screen active">
    <div class="hero-badge">LIMITED BENEFIT</div>
    <div class="app-title">インスタ本気合宿<br>復習クイズ</div>
    <div class="app-sub">学んだことを血肉に変え、<br>インスタ運用の「基準」を極限まで引き上げましょう🔥</div>
    
    <div class="genre-grid">
      <button class="genre-card" onclick="startQuiz('stories')">
        <span class="g-dot">📖</span>
        <div class="genre-name">ストーリーズ</div>
        <div class="genre-count">MISSION: 4</div>
      </button>
      <button class="genre-card" onclick="startQuiz('reels')">
        <span class="g-dot">🎬</span>
        <div class="genre-name">リール投稿</div>
        <div class="genre-count">MISSION: 4</div>
      </button>
      <button class="genre-card" onclick="startQuiz('profile')">
        <span class="g-dot">👤</span>
        <div class="genre-name">プロフィール</div>
        <div class="genre-count">MISSION: 4</div>
      </button>
      <button class="genre-card all-card" onclick="startQuiz('all')">
        <span class="g-dot">🔥</span>
        <div>
          <div class="genre-name">全ジャンル・最終試練</div>
          <div class="genre-count">12 QUESTIONS</div>
        </div>
      </button>
    </div>
  </div>

  <div id="quiz" class="screen">
    <div class="q-header">
      <div class="q-meta">
        <div class="q-badge-wrap">
          <span class="q-badge" id="genre-badge"></span>
          <span id="q-counter" style="font-size:12px; color:#FF4D00; font-weight:800;"></span>
        </div>
        <button class="home-btn" onclick="confirmGoHome()">🏠 HOME</button>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
    <div class="question-text" id="question-text"></div>
    <div id="choices"></div>
    <div class="feedback" id="feedback">
      <div class="fb-head" id="fb-head"></div>
      <div id="fb-body"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()"></button>
  </div>

  <div id="result" class="screen">
    <div class="result-top">
      <div style="font-size:10px; letter-spacing:0.2em; color:#FF4D00; margin-bottom:10px">MISSION COMPLETE</div>
      <div class="score-wrap">
        <span class="score-big" id="score-big">0</span>
        <span style="font-size:22px; color:#444"> / <span id="score-denom"></span></span>
      </div>
      <div class="score-msg" id="score-msg"></div>
    </div>
    <div id="result-list" style="margin-bottom:1.5rem"></div>
    <button class="retry-btn" onclick="retryQuiz()">もう一度、己を磨く</button>
    <button class="back-btn-res" onclick="goHome()">ジャンル選択に戻る</button>
  </div>
</div>

<script>
const Q = {
  stories: [
    { q: "ストーリーズの画像1枚で伝えるべき構成として、最も効果的なのはどれ？", choices: ["商品の詳細スペックを細かく記載する", "フックで興味を引き、問題提示で共感させ、CTAへ誘導する", "できるだけ多くの情報を詰め込む", "おしゃれなデザインを最優先にする"], correct: 1, explain: "ストーリーズは1枚で完結。フック→問題提示→CTAの流れが鉄則です。" },
    { q: "ストーリーズで「フック」として最も適切なのはどれ？", choices: ["「こんにちは！今日もよろしくお願いします」", "「新商品のご紹介です」", "「これを知らないと損してます」「〇〇で悩んでいませんか？」", "ブランドロゴを大きく表示する"], correct: 2, explain: "1秒で指を止めさせるフック。疑問・問いかけ・損失回避が強力です。" },
    { q: "ストーリーズのCTA（行動喚起）として適切なものはどれ？", choices: ["「よかったら見てみてください」", "「プロフィールのリンクをタップして詳細をチェック」", "「いいねしてくれると嬉しいです」", "何も書かずデザインだけで伝える"], correct: 1, explain: "曖昧さは離脱を生みます。具体的なアクションを明示しましょう。" },
    { q: "ストーリーズは一般的に何秒で視聴を続けるか判断される？", choices: ["15〜30秒じっくり読んでもらえる", "1〜3秒で判断される", "最後まで必ず見てもらえる", "再生速度は関係ない"], correct: 1, explain: "1〜3秒で不要と思われたら即座にスキップ。最初の一言が命です。" }
  ],
  reels: [
    { q: "リール投稿で最初の数秒に必ず入れるべきものはどれ？", choices: ["自己紹介とアカウント名", "BGMのみで視覚的な静止画", "視聴者が「続きを見たい」と思うフック（問いかけや驚き）", "エンドロールとクレジット"], correct: 2, explain: "冒頭1秒がすべて。視聴維持率を稼ぐためのフックを必ず入れましょう。" },
    { q: "リールのキャプション（説明文）の役割として正しいのはどれ？", choices: ["動画の内容をすべて文字で書き起こす", "ハッシュタグを50個以上並べる", "動画で伝えた価値を補完し、保存・コメントを促す", "書かなくてもアルゴリズムに影響しない"], correct: 2, explain: "キャプションは滞在時間を伸ばし、保存シグナルを貰うための戦場です。" },
    { q: "リールのハッシュタグ戦略として効果的なのはどれ？", choices: ["人気タグを無差別に30個付ける", "ジャンルに合った中〜小規模タグを5〜10個絞る", "ハッシュタグは一切使わない", "タグは毎回同じものを使い続ける"], correct: 1, explain: "広すぎるタグは埋もれます。中〜小規模タグで専門性を学習させましょう。" },
    { q: "リールの投稿頻度として、アルゴリズム上おすすめなのはどれ？", choices: ["月1回、クオリティ重視で投稿する", "毎日必ず投稿しないといけない", "週3〜5回を目安に、継続できるペースで投稿する", "思いついたときだけ投稿する"], correct: 2, explain: "「継続」は最大の信頼。週3〜5回で質を落とさず戦うのが勝利への近道です。" }
  ],
  profile: [
    { q: "プロフィールの「名前（表示名）」に入れるべき内容として最も適切なのはどれ？", choices: ["本名のフルネームをそのまま入力する", "自分の肩書きや専門性を示す言葉（それだけで何者か伝わる内容）", "かわいいニックネームや記号を並べる", "アカウントIDと全く同じにする"], correct: 1, explain: "名前は検索キーワード。入っていないのは大きな機会損失です。" },
    { q: "プロフィール文（bio）で最初に伝えるべきことはどれ？", choices: ["趣味や出身地などの個人情報", "フォロワーへのお礼と挨拶", "このアカウントをフォローすると何が得られるか（ベネフィット）", "投稿頻度と更新スケジュール"], correct: 2, explain: "ユーザーは「自分に何の得があるか」を瞬時に判断します。" },
    { q: "プロフィール画像（アイコン）として最も効果的なのはどれ？", choices: ["風景写真や好きなキャラクター画像", "ロゴだけのシンプルなテキスト画像", "顔がはっきり写っている写真（親近感・信頼感が出る）", "毎月違う写真に変える"], correct: 2, explain: "アイコンは信頼の顔。清潔感のある顔出し写真はフォロー率に直結します。顔出ししない場合はイラストなども有効です。" },
    { q: "プロフィールのリンク先として最も効果的なのはどれ？", choices: ["Instagramトップページに戻るリンク", "目的（LINE登録・LP・申し込み）に直結する1本のURL", "すべてのSNSアカウントを羅列したリンク集", "リンクは設定しなくても問題ない"], correct: 1, explain: "選択肢が多いと人は選べません。最優先の出口一つに絞りましょう。" }
  ]
};

const GENRE_LABEL = { stories: 'STORIES', reels: 'REELS', profile: 'PROFILE', all: 'FINAL MISSION' };
let currentGenre = '', questions = [], currentIndex = 0, score = 0, answers = [], answered = false;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz(genre) {
  currentGenre = genre;
  questions = genre === 'all' ? shuffle([...Q.stories, ...Q.reels, ...Q.profile]) : shuffle([...Q[genre]]);
  currentIndex = 0; score = 0; answers = [];
  renderQ();
  show('quiz');
}

function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

function renderQ() {
  answered = false;
  const q = questions[currentIndex], total = questions.length;
  document.getElementById('genre-badge').textContent = GENRE_LABEL[currentGenre];
  document.getElementById('q-counter').textContent = (currentIndex + 1) + ' / ' + total;
  document.getElementById('progress-fill').style.width = (currentIndex / total * 100) + '%';
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';
  const c = document.getElementById('choices'); c.innerHTML = '';
  q.choices.forEach((ch, i) => {
    const b = document.createElement('button');
    b.className = 'choice-btn'; b.textContent = ch;
    b.onclick = () => pick(i); c.appendChild(b);
  });
}

function pick(i) {
  if (answered) return; answered = true;
  const q = questions[currentIndex];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  btns[q.correct].classList.add('correct');
  const ok = i === q.correct;
  if (!ok) btns[i].classList.add('wrong');
  if (ok) score++;
  answers.push({ q: q.q, ok, correctAnswer: q.choices[q.correct] });
  document.getElementById('fb-head').textContent = ok ? '✓ その通り！素晴らしい！' : '✗ 惜しい！次で取り返しましょう！';
  document.getElementById('fb-body').textContent = q.explain;
  document.getElementById('feedback').className = 'feedback show ' + (ok ? 'correct' : 'wrong');
  const nb = document.getElementById('next-btn');
  nb.textContent = currentIndex < questions.length - 1 ? '次なるステップへ' : '運命の結果を確認';
  nb.style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) { showResult(); return; }
  renderQ();
}

function showResult() {
  const total = questions.length;
  document.getElementById('score-big').textContent = score;
  document.getElementById('score-denom').textContent = total;
  const pct = score / total;

  let message = '';
  if (pct === 1) {
    message = '全問正解！完璧です！合宿での学びが完全にあなたの力になっていますね。この情熱をそのまま実践にぶつけましょう！';
  } else if (pct >= 0.8) {
    message = 'あともう一息！素晴らしい集中力です。あと少しの修正で完璧になれます。最高の結果を目指してリトライしましょう！';
  } else if (pct >= 0.5) {
    message = '着実にステップアップしていますね！半分は自分のものにできています。残りの半分も一緒に克服して、自信を深めていきましょう！';
  } else {
    message = '伸びしろたっぷりです！まずは焦らず、もう一度資料を振り返ってみましょう。基礎を固めれば、必ず視界が開けてきます。次はもっといけますよ！';
  }
  document.getElementById('score-msg').textContent = message;
  show('result');
}

function confirmGoHome() {
  if (confirm("挑戦を中断してホームに戻りますか？\n（これまでの進行状況はリセットされます）")) {
    goHome();
  }
}

function retryQuiz() { startQuiz(currentGenre); }
function goHome() { show('start'); }
</script>
</body>
</html>
