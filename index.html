<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成功への扉！インスタ本気合宿総復習クイズ</title>
<style>
*{
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}
:root{
  --c-bg: #FFF7ED;
  --c-main: #EA580C;
  --c-deep: #9A3412;
  --c-card: #FFFFFF;
  --c-text: #431407;
  --c-success: #15803D;
  --c-error: #B91C1C;
}
body{
  font-family:'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  line-height: 1.5;
}

#app{max-width:520px;margin:0 auto;padding:1rem 0.75rem}
.screen{display:none}
.screen.active{display:block; animation: fadeIn 0.4s ease;}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ===== 開始画面 ===== */
.hero-badge{
  display: inline-block;
  background: var(--c-main);
  color: #fff;
  font-size: 12px;
  font-weight: bold;
  padding: 4px 12px;
  border-radius: 4px;
  margin-bottom: 0.5rem;
}
.app-title{
  font-size: 28px;
  font-weight: 900;
  line-height: 1.2;
  margin-bottom: 0.8rem;
  background: linear-gradient(135deg, #EA580C 0%, #9A3412 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.app-sub{
  font-size: 14px;
  color: var(--c-deep);
  margin-bottom: 1.5rem;
  border-left: 4px solid var(--c-main);
  padding-left: 0.8rem;
  font-weight: bold;
}

.genre-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.5rem}
.genre-card{
  background: var(--c-card);
  border: 1px solid #FED7AA;
  border-radius: 12px;
  padding: 1rem 0.5rem;
  cursor: pointer;
  text-align: left;
}
.genre-name{font-size:13px;font-weight:bold;color:var(--c-text); display: block; margin-top: 5px;}
.genre-count{font-size:10px;color:var(--c-main);margin-top:2px;font-weight: bold;}

.all-card{
  grid-column: 1/-1;
  background: #FFF;
  border: 2px solid var(--c-main) !important;
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 1rem;
}

/* ===== クイズ画面 ===== */
.q-meta{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
.q-badge{font-size:11px; font-weight:bold; padding:4px 12px; border-radius:4px; background:var(--c-main); color:#fff;}
.home-btn{ background: #fff; border: 1px solid #FED7AA; color: var(--c-deep); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px;}

.progress-bar{height:6px;background:#FFEDD5;border-radius:3px; overflow: hidden; margin-bottom: 10px;}
.progress-fill{height:100%;background:var(--c-main); transition:width 0.4s;}

.question-text{font-size:18px;font-weight:bold;margin-bottom:1rem; color: var(--c-deep); line-height: 1.4;}

#choices{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.choice-btn{
  background: #fff;
  border: 1px solid #FED7AA;
  border-radius: 10px;
  padding: 0.75rem 0.5rem;
  cursor: pointer;
  text-align: center;
  font-size: 14px;
  font-weight: bold;
  color: var(--c-text);
  width: 100%;
  min-height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1.3;
}
.choice-btn.correct{ border-color: var(--c-success); background: #DCFCE7; color: var(--c-success); border-width: 2px;}
.choice-btn.wrong{ border-color: var(--c-error); background: #FEE2E2; color: var(--c-error); border-width: 2px;}

.feedback{ padding: 0.8rem; border-radius: 10px; display: none; margin-top: 10px; border: 1px solid;}
.feedback.show{display:block;}
.feedback.correct{background:#DCFCE7; border-color:var(--c-success); color: #064E3B;}
.feedback.wrong{background:#FEE2E2; border-color:var(--c-error); color: #7F1D1D;}

.next-btn{
  margin-top: 10px; width: 100%; padding: 1rem; background: var(--c-main); border: none; border-radius: 12px; color: #fff; font-weight: bold; font-size: 17px; cursor: pointer; display: none; box-shadow: 0 4px 0 var(--c-deep);
}

/* ===== 結果画面 ===== */
.result-top{ background: #fff; border: 2px solid var(--c-main); border-radius: 20px; padding: 2rem 1rem; text-align: center; margin-bottom: 1rem; }
.score-big{ font-size: 56px; font-weight: 900; color: var(--c-main); }
</style>
</head>
<body>

<div id="app">
  <div id="start" class="screen active">
    <div class="hero-badge">インスタ本気合宿参加特典</div>
    <div class="app-title">成功への扉！<br>インスタ本気合宿<br>総復習クイズ</div>
    <div class="app-sub">インスタ運用の「基準」を極限まで引き上げましょう🔥</div>
    
    <div class="genre-grid">
      <button class="genre-card" onclick="startQuiz('stories')">
        <span style="font-size:20px">📱</span>
        <span class="genre-name">ストーリーズ</span>
        <span class="genre-count">全 10 問</span>
      </button>
      <button class="genre-card" onclick="startQuiz('reels')">
        <span style="font-size:20px">🎬</span>
        <span class="genre-name">リール投稿</span>
        <span class="genre-count">全 10 問</span>
      </button>
      <button class="genre-card" onclick="startQuiz('profile')">
        <span style="font-size:20px">👤</span>
        <span class="genre-name">プロフィール</span>
        <span class="genre-count">全 10 問</span>
      </button>
      <button class="genre-card all-card" onclick="startQuiz('all')">
        <span style="font-size:24px">🔥</span>
        <div class="genre-info">
          <span class="genre-name" style="margin:0">全ジャンル・最終試練</span>
          <span class="genre-count">30問 連続挑戦</span>
        </div>
      </button>
    </div>
  </div>

  <div id="quiz" class="screen">
    <div class="q-header">
      <div class="q-meta">
        <span class="q-badge" id="genre-badge"></span>
        <button class="home-btn" onclick="confirmGoHome()">戻る</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div id="q-counter" style="font-size:13px; color:var(--c-main); font-weight:bold;"></div>
    </div>
    <div class="question-text" id="question-text"></div>
    <div id="choices"></div>
    <div class="feedback" id="feedback">
      <div style="font-weight:bold; font-size:16px; margin-bottom:2px;" id="fb-head"></div>
      <div id="fb-body" style="font-size:14px; font-weight:500;"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()"></button>
  </div>

  <div id="result" class="screen">
    <div class="result-top">
      <div style="font-size:13px; font-weight:bold; color:var(--c-main); margin-bottom:5px">合格判定</div>
      <div class="score-wrap">
        <span class="score-big" id="score-big">0</span>
        <span style="font-size:20px; color:#999"> / <span id="score-denom"></span></span>
      </div>
      <div id="score-msg" style="margin-top:0.8rem; font-weight:bold; font-size:15px; line-height:1.4;"></div>
    </div>
    <button style="width:100%; padding:1.1rem; background:var(--c-deep); color:#fff; border:none; border-radius:12px; font-weight:bold; font-size:17px; cursor:pointer; margin-bottom:10px;" onclick="retryQuiz()">もう一度挑戦する</button>
    <button style="width:100%; padding:0.8rem; background:transparent; color:var(--c-deep); border:1px solid #FED7AA; border-radius:12px; cursor:pointer; font-weight:bold;" onclick="goHome()">ジャンル選択に戻る</button>
  </div>
</div>

<script>
const Q = {
  stories: [
    { q: "インスタの仕組みで「この二人は仲が良い」と最も強く判断される読者の動きはどれですか？", choices: ["投稿を最後まで見た", "メッセージのやり取り", "アンケートに答えた", "画面を長押しした"], correct: 1, explain: "メッセージのやり取りは、インスタから「深い付き合いがある」とみなされます。これが一番、表示されやすくなる理由です。" },
    { q: "ストーリーを途中で止められずに最後まで見てもらうコツは？", choices: ["文字をギッシリ書く", "最初の3枚で興味を引く", "デザインを毎回変える", "答えを最後まで隠す"], correct: 1, explain: "ストーリーは「紙芝居」のようなものです。出だしで興味を持ってもらい、スムーズに進むことが離脱を防ぎます。" },
    { q: "閲覧数がガクンと落ちた時、表示をやり直す「リセット」の方法は？", choices: ["1日20枚投稿する", "24時間投稿を止める", "ハッシュタグを増やす", "昔の投稿を出す"], correct: 1, explain: "一度すべての投稿が消える24時間を待つことで、悪い流れがリセットされます。その後、答えやすい質問を出すのがコツです。" },
    { q: "リンク（青いボタン）を押してもらうために、一番大切なことは？", choices: ["1枚目にすぐ置く", "解決後の良さを伝える", "画面中央に大きく置く", "何度もお願いする"], correct: 1, explain: "「なぜ押す必要があるのか」という理由がないと、人はボタンを押さずに通り過ぎてしまいます。" },
    { q: "アンケートボタンの置き場所で、最も答えを貰いやすいのは？", choices: ["画面の一番上", "親指が届きやすい場所", "写真の邪魔をしない端", "どこでも同じ"], correct: 1, explain: "多くの人は片手で操作しています。親指が届きにくい場所にあると、面倒になって答えてくれません。" },
    { q: "まずは誰に喜んでもらえる投稿を出すのが、一番効率が良い？", choices: ["新しいお客さん候補", "自分に興味がない人", "今のフォロワーさん", "ライバルのファン"], correct: 2, explain: "まずは「いつも見てくれる人」に喜んでもらうことで、インスタ側が「これは良い投稿だ」と判断し、新しい人へ広げてくれます。" },
    { q: "お客さんの投稿を紹介（タグ付け返し）するメリットは？", choices: ["投稿を作る手間が省ける", "次の口コミが増える", "フォロワーが勝手に増える", "オシャレに見える"], correct: 1, explain: "紹介された人は嬉しくなり、また応援したくなります。この「信頼の連鎖」がお客さんを増やします。" },
    { q: "投稿をじっくり見てもらう（再生時間を稼ぐ）ためにプロが使う技は？", choices: ["隅に小さな補足を入れる", "動画を無音にする", "長く自分を写す動画", "ボタンの周りを光らせる"], correct: 0, explain: "「何て書いてあるかな？」と画面を止めたり、よく見ようとさせる工夫が、インスタからの高い評価に繋がります。" },
    { q: "ストーリーの「ハッシュタグ」は、今の仕組みではどう扱うのが正解？", choices: ["無理に付けなくて良い", "10個以上は必ず付ける", "隠してこっそり付ける", "英語のタグを付ける"], correct: 0, explain: "現在のインスタは、タグよりも「投稿の中身そのもの」を自動で判別しています。無理にタグを付ける必要はありません。" },
    { q: "1日の投稿枚数について、一番「嫌われない」考え方は？", choices: ["多ければ多いほど良い", "毎日5枚は義務とする", "話が完結する枚数に絞る", "見る人が減ったらやめる"], correct: 2, explain: "中身の薄い投稿をダラダラ続けると、見る側は飛ばすようになります。意味のある内容を1セットで出すのが正解です。" }
  ],
  reels: [
    { q: "リール動画で最短で結果を出すための「お手本の探し方」として、最も正しいのはどれですか？", choices: ["有名な人の投稿を真似る", "フォロワーが少ないのに再生数が多い動画", "自分が撮りたいものを撮る", "直近1週間の投稿だけ見る"], correct: 1, explain: "知名度ではなく内容の力だけで伸びている動画を探すのが、成功への近道です。" },
    { q: "「異常値」と呼ばれる、特にお手本にすべき動画の再生数の目安は？", choices: ["フォロワー数の10倍以上", "フォロワー数と同じ", "常に1万回以上", "いいね数が多いもの"], correct: 0, explain: "平均的な数字ではなく、フォロワー数と再生数の大きなギャップに注目するのがプロの視点です。" },
    { q: "動画が1秒で飛ばされるのを防ぐために、冒頭で絶対にやってはいけないことは？", choices: ["衝撃的な映像を見せる", "丁寧な挨拶をする", "動画の結論を先に言う", "読者の悩みを言い当てる"], correct: 1, explain: "知らない人の画面に突然出るリールでは、挨拶をしている間に読者は去ってしまいます。" },
    { q: "リール台本を書くときに、読者が疲れて離脱するのを防ぐための鉄則は？", choices: ["文字を画面いっぱいに出す", "1動画につきテーマを1つに絞る", "わざと早口で喋る", "頑張りましょうと励ます"], correct: 1, explain: "情報が多すぎると何が言いたいか伝わりません。1つのリールには1つのテーマで簡潔にまとめましょう。" },
    { q: "役立つ情報を伝える教育系の動画で、最も離脱されにくい構成はどれ？", choices: ["ストーリーテリング型", "結論ファースト型", "ランキングリスト型", "Q&A回答型"], correct: 1, explain: "結論、理由、解決策の順で話すと価値がすぐに伝わり、最後まで見てもらいやすくなります。" },
    { q: "あなた自身のファンになってもらうために、最も適した物語の構成はどれ？", choices: ["成功体験だけを語る型", "人間味のある失敗談や成長物語", "商品の良さを伝える型", "流行を追いかける型"], correct: 1, explain: "完璧な姿より、泥臭い成長過程を見せることで読者は感情移入し、ファンになってくれます。" },
    { q: "リール動画の広まりを助けてくれる「音楽（音源）」選びの目印は？", choices: ["自分の好きな曲", "右肩上がりの矢印がある曲", "誰もが知る超有名な曲", "音が一切ない無音"], correct: 1, explain: "音源名の横の右肩上がりの矢印は現在勢いがある証拠です。この波に乗るのが最短の勝ち筋です。" },
    { q: "トーク系動画で、声を聞き取りやすくするための理想的な音量バランスは？", choices: ["声100：BGM 5～10", "声100：BGM 50", "声とBGMを同じにする", "BGMを一切入れない"], correct: 0, explain: "声の聞き取りやすさが最優先です。BGMはうっすら流れる程度が、最も読者に親切な設計です。" },
    { q: "表紙（サムネイル）を作る際、文字が切れて見栄えが悪くなるのを防ぐコツは？", choices: ["画面の端に書く", "真ん中の正方形部分に文字を収める", "文字を白一色にする", "情報をたくさん詰め込む"], correct: 1, explain: "プロフィール画面では正方形で表示されます。見切れないよう中央の範囲を意識して文字を配置しましょう。" },
    { q: "投稿直前の設定で、動画がボヤけて見栄えが悪くなるのを防ぐための必須項目は？", choices: ["最高画質でアップロードをON", "場所を細かく入力", "ハッシュタグを30個付ける", "トピックを10個以上選ぶ"], correct: 0, explain: "この設定を忘れると、インスタ側で動画が圧縮され、画質が大幅に落ちてしまいます。" }
  ],
  profile: [
    { q: "相手があなたのプロフィールを見て、フォローするかを決める時間はどれくらい？", choices: ["30秒以内", "5秒以内", "1分以上", "飽きるまで"], correct: 1, explain: "ユーザーはわずか5秒以内で判断を下します。一瞬の分かりやすさが何よりも重要です。" },
    { q: "プロフィールを作る時、見た目の素敵さよりも最優先すべきことは何？", choices: ["最新の流行", "分かりやすさ", "自分の好きな色", "豪華な経歴"], correct: 1, explain: "オシャレさよりも、パッと見て何のアカウントか分かる分かりやすさが最優先のルールです。" },
    { q: "アカウント名の鉄板ルールとして、正しい組み合わせはどれ？", choices: ["本名のみ", "好きな英単語のみ", "名前 ＋ 肩書き", "あだ名だけ"], correct: 2, explain: "名前と肩書きを組み合わせるのが基本の形です。肩書きで何の人かをハッキリ伝えましょう。" },
    { q: "アカウント名に検索されそうな言葉を入れるべき最大の理由は？", choices: ["検索対象になるから", "名前が長いとかっこいいから", "フォロワー外へ通知が行くから", "海外の人に見つかるから"], correct: 0, explain: "アカウント名はインスタ内の検索に引っかかります。探されている言葉を入れるのが鉄則です。" },
    { q: "自分の名前を付ける時、覚えやすくするために推奨されている文字数は？", choices: ["10文字以内", "2文字だけ", "4文字以内", "制限はない"], correct: 2, explain: "呼びやすく覚えやすい4文字以内がポイントです。あだ名でも大丈夫です。" },
    { q: "プロフィール文章の中で、勝負が決まると言われているのはどこ？", choices: ["最初の2行", "最後の一文", "真ん中の実績部分", "全体をまんべんなく"], correct: 0, explain: "何についてのアカウントか、最初の2行で伝えることがフォローされるかどうかの分かれ道です。" },
    { q: "まだ大きな実績がない場合、信頼してもらうために実績の欄にどう書くのが正解？", choices: ["嘘でもいいから大きな数字を書く", "小さな具体的な数字や経験を書く", "実績の欄は空欄にする", "有名な人の実績を借りる"], correct: 1, explain: "立派な実績がなくても、小さくても具体的な数字や、これまでの経験・背景を載せることで信頼に繋がります。" },
    { q: "アイコン画像の中で、最も信頼性が高いのはどれ？", choices: ["オシャレな風景写真", "会社のロゴマーク", "実写の顔写真", "好きなキャラクター"], correct: 2, explain: "顔写真の実写が最も信頼性が高いです。顔出しをしない場合はオリジナルの似顔絵を使いましょう。" },
    { q: "プロフィール文章の最後に必ず入れるべき行動喚起（CTA）とはどういう意味？", choices: ["感謝の言葉", "リンクを押して等の指示", "自分の趣味の紹介", "今日の日記"], correct: 1, explain: "リンクをクリックしてほしいなど、最後にやってほしいことをハッキリ指示するのが大切です。" },
    { q: "プロフィールの完成度について、正しい考え方はどれ？", choices: ["最初から完璧にする", "一度作ったら変えない", "反応を見ながら育てていく", "プロに任せて放置する"], correct: 2, explain: "プロフィールは一度作って終わりではなく、反応を見ながら改善を繰り返して育てていくものです。" }
  ]
};

let currentGenre = '', questions = [], currentIndex = 0, score = 0, answered = false;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz(genre) {
  currentGenre = genre;
  if (genre === 'all') {
    // それぞれのジャンル名を追加して合体させる
    const s = Q.stories.map(q => ({...q, category: 'ストーリーズ'}));
    const r = Q.reels.map(q => ({...q, category: 'リール投稿'}));
    const p = Q.profile.map(q => ({...q, category: 'プロフィール'}));
    questions = shuffle([...s, ...r, ...p]);
  } else {
    questions = shuffle([...Q[genre]]);
  }
  currentIndex = 0; score = 0;
  renderQ();
  show('quiz');
}

function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

function renderQ() {
  answered = false;
  const q = questions[currentIndex], total = questions.length;
  const labelMap = { stories: 'ストーリーズ', reels: 'リール投稿', profile: 'プロフィール', all: '最終試練' };
  
  let badgeText = labelMap[currentGenre];
  // 最終試練の時だけ、その問題の本来のジャンルを横に添える
  if (currentGenre === 'all' && q.category) {
    badgeText = `最終試練（${q.category}）`;
  }
  
  document.getElementById('genre-badge').textContent = badgeText;
  document.getElementById('q-counter').textContent = (currentIndex + 1) + ' 問目 / ' + total;
  document.getElementById('progress-fill').style.width = (currentIndex / total * 100) + '%';
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';
  const c = document.getElementById('choices'); c.innerHTML = '';
  q.choices.forEach((ch, i) => {
    const b = document.createElement('button');
    b.className = 'choice-btn'; b.textContent = ch;
    b.onclick = () => pick(i); c.appendChild(b);
  });
}

function pick(i) {
  if (answered) return; answered = true;
  const q = questions[currentIndex];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  btns[q.correct].classList.add('correct');
  const ok = i === q.correct;
  if (!ok) btns[i].classList.add('wrong');
  if (ok) score++;

  const fb = document.getElementById('feedback');
  document.getElementById('fb-head').textContent = ok ? '✓ 正解です！' : '✗ 残念、不正解です';
  document.getElementById('fb-body').textContent = q.explain;
  fb.className = 'feedback show ' + (ok ? 'correct' : 'wrong');
  
  const nb = document.getElementById('next-btn');
  nb.textContent = currentIndex < questions.length - 1 ? '次の問題へ進む' : '最終結果を確認する';
  nb.style.display = 'block';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) { showResult(); return; }
  renderQ();
}

function showResult() {
  const total = questions.length;
  document.getElementById('score-big').textContent = score;
  document.getElementById('score-denom').textContent = total;
  const pct = score / total;
  let msg = pct === 1 ? "【素晴らしい！】完璧です。自信を持って運用しましょう！" : pct >= 0.8 ? "【プロ級です！】あと少しで満点です。間違えた部分を復習すれば完璧です。" : pct >= 0.5 ? "【合格です】基礎はしっかりしています。あともう一息です。" : "【伸び代あり！】焦らなくて大丈夫です。もう一度基本から固めていきましょう。";
  document.getElementById('score-msg').textContent = msg;
  show('result');
}

function confirmGoHome() {
  if (confirm("戻りますか？（今の成績は消えます）")) goHome();
}
function retryQuiz() { startQuiz(currentGenre); }
function goHome() { show('start'); }
</script>
</body>
</html>
